name: Update Formula

on:
  repository_dispatch:
    types: [release-published]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout tap
      uses: actions/checkout@v4

    - name: Get release info
      id: release
      env:
        VERSION: ${{ github.event.client_payload.version }}
      run: |
        # Strip leading 'v' if present
        CLEAN_VERSION="${VERSION#v}"
        echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT

        # Download checksums
        BASE_URL="https://github.com/crimson-knight/amber_cli/releases/download/${VERSION}"

        curl -sL "${BASE_URL}/amber-cli-darwin-arm64.tar.gz.sha256" -o darwin.sha256
        curl -sL "${BASE_URL}/amber-cli-linux-x86_64.tar.gz.sha256" -o linux.sha256

        echo "darwin_sha256=$(cut -d' ' -f1 < darwin.sha256)" >> $GITHUB_OUTPUT
        echo "linux_sha256=$(cut -d' ' -f1 < linux.sha256)" >> $GITHUB_OUTPUT

    - name: Update formula
      env:
        VERSION: ${{ steps.release.outputs.version }}
        DARWIN_SHA: ${{ steps.release.outputs.darwin_sha256 }}
        LINUX_SHA: ${{ steps.release.outputs.linux_sha256 }}
      run: |
        cat > Formula/amber-cli.rb << FORMULA
        class AmberCli < Formula
          desc "Command-line tool and LSP for the Amber web framework (Crystal)"
          homepage "https://amberframework.org"
          license "MIT"
          version "${VERSION}"

          on_macos do
            if Hardware::CPU.arm?
              url "https://github.com/crimson-knight/amber_cli/releases/download/v${VERSION}/amber-cli-darwin-arm64.tar.gz"
              sha256 "${DARWIN_SHA}"
            end
          end

          on_linux do
            if Hardware::CPU.intel?
              url "https://github.com/crimson-knight/amber_cli/releases/download/v${VERSION}/amber-cli-linux-x86_64.tar.gz"
              sha256 "${LINUX_SHA}"
            end
          end

          def install
            bin.install "amber"
            bin.install "amber-lsp"
          end

          test do
            system "#{bin}/amber", "--version"
            system "#{bin}/amber-lsp", "--help"
          end
        end
        FORMULA

        # Fix indentation (heredoc adds leading spaces)
        sed -i 's/^        //' Formula/amber-cli.rb

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/amber-cli.rb
        git commit -m "Update amber-cli to ${VERSION}"
        git push
