name: Validate Install

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  install-smoke:
    name: Install Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
    - name: Ensure Homebrew (Linux)
      if: runner.os == 'Linux'
      run: |
        if ! command -v brew >/dev/null 2>&1; then
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
        echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

    - name: Show Environment
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        fi
        brew --version
        uname -a
        uname -m

    - name: Install Amber CLI
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        fi
        brew tap amberframework/amber_cli
        brew install amber_cli
        brew test amber_cli
        amber --version
        test -x "$(command -v amber-lsp)"
        crystal --version
        shards --version

    - name: Scaffold and Build Web App
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        fi
        mkdir smoke
        cd smoke
        amber new smoke_app -y --no-deps
        test -f smoke_app/shard.yml
        test -f smoke_app/.amber.yml
        cd smoke_app
        shards install
        mkdir -p bin
        crystal build src/smoke_app.cr -o bin/smoke_app
